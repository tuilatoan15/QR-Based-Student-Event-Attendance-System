name: smart_event_attendance_mobile
description: A Flutter mobile app for the QR-Based Student Event Attendance System.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.1
  shared_preferences: ^2.4.0
  qr_flutter: ^4.1.0
  provider: ^6.1.2
  mobile_scanner: ^3.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

