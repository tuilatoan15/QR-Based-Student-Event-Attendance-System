name: smart_event_attendance_mobile
description: A Flutter mobile app for the QR-Based Student Event Attendance System.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.1
  shared_preferences: ^2.4.0
  device_info_plus: 12.4.0
  qr_flutter: ^4.1.0
  provider: ^6.1.2
  mobile_scanner: ^3.0.0
  intl: ^0.19.0
  image_picker: ^1.2.1
  html_editor_enhanced: ^2.7.1
  flutter_widget_from_html_core: ^0.16.1
  url_launcher: ^6.3.2
  flutter_local_notifications: ^17.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo/logo.png

