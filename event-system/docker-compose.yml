version: '3.9'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: qr-event-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Passw0rd
    ports:
      - '1433:1433'
    healthcheck:
      test: ['CMD', '/opt/mssql-tools/bin/sqlcmd', '-S', 'localhost', '-U', 'sa', '-P', 'YourStrong!Passw0rd', '-Q', 'SELECT 1']
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: qr-event-backend
    depends_on:
      - sqlserver
    environment:
      - PORT=5000
      - DB_USER=sa
      - DB_PASSWORD=YourStrong!Passw0rd
      - DB_SERVER=sqlserver
      - DB_NAME=event_system
      - JWT_SECRET=changeme_in_prod
    ports:
      - '5000:5000'

